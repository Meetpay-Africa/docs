<svg width="960" height="320" viewBox="0 0 960 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="MeetPay payments infrastructure">
  <defs>
    <linearGradient id="glow-emerald" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glow-blue" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#94A3B8" stroke-opacity="0.18" stroke-width="1"/>
    </pattern>
    <radialGradient id="fade" cx="50%" cy="50%" r="65%">
      <stop offset="55%" stop-color="#0F172A" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0F172A" stop-opacity="1"/>
    </radialGradient>
  </defs>

  <rect width="960" height="320" rx="24" fill="#0F172A"/>
